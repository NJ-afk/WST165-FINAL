<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Succulent Plant Table</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f8f4;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #5b8a72;
        }

        table {
            width: 85%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        th, td {
            border: 1px solid #c8d6c0;
            padding: 15px;
            text-align: center;
        }

        th {
            background-color: #8fbc8f;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f7fbf7;
        }

        tr:hover {
            background-color: #e6f2e6;
        }

        img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>Succulent Care Table</h1>

    <table>
        <tr>
            <th>Plant Name</th>
            <th>Light Needed</th>
            <th>Watering</th>
            <th>Image</th>
        </tr>

        <tr>
            <td>Haworthia</td>
            <td>Bright indirect light</td>
            <td>Every 2 weeks</td>
            <td><img src="ASSIGNMENT2_IMG/HAWORTHIA.jpg" alt="Haworthia"></td>
        </tr>

        <tr>
            <td>Lithops</td>
            <td>Direct sunlight</td>
            <td>Once a month</td>
            <td><img src="ASSIGNMENT2_IMG/LITHOPS.jpg" alt="Lithops"></td>
        </tr>

        <tr>
            <td>Jade Plant</td>
            <td>Bright indirect light</td>
            <td>Every 2–3 weeks</td>
            <td><img src="ASSIGNMENT2_IMG/JADE.jpg" alt="Jade Plant"></td>
        </tr>

        <tr>
            <td>Echeveria</td>
            <td>Full sun</td>
            <td>Once a week</td>
            <td><img src="ASSIGNMENT2_IMG/ECHEVERIA.jpg" alt="Echeveria"></td>
        </tr>
    </table>

</body>
</html>
